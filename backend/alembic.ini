# Alembic configuration for the Budget Tracker backend.
#
# The actual database URL is injected at runtime from app.config.settings
# (env-driven DATABASE_URL) inside alembic/env.py, so the sqlalchemy.url
# below is only a harmless placeholder.
#
# Usage (from backend/):
#   alembic upgrade head        # apply all migrations
#   alembic downgrade -1        # roll back one
#   alembic revision --autogenerate -m "describe change"

[alembic]
# Path to migration scripts, relative to this file.
script_location = alembic

# Make the `app` package importable when alembic runs from this folder.
prepend_sys_path = .

# Template used to generate new migration files.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Placeholder only — env.py overrides this with settings.DATABASE_URL.
sqlalchemy.url = postgresql+asyncpg://budget:budget@localhost:5432/budget_tracker


# ── Logging ─────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
